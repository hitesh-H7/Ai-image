<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HC | Super Fast AI</title>
    <style>
        :root { --p: #ff4d00; --s: #ff9900; --bg: #020617; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: sans-serif; text-align: center; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        
        .card { width: 90%; max-width: 400px; background: rgba(255,255,255,0.05); padding: 25px; border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { background: linear-gradient(var(--p), var(--s)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        
        textarea { width: 100%; padding: 12px; background: #000; color: #fff; border: 1px solid #333; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box; outline: none; }
        .btn { background: linear-gradient(45deg, var(--p), var(--s)); border: none; padding: 15px; color: white; border-radius: 50px; font-weight: bold; width: 100%; cursor: pointer; box-shadow: 0 5px 15px rgba(255, 77, 0, 0.3); }
        
        #loader { display: none; margin: 15px auto; color: var(--s); font-size: 0.8rem; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        #result-box { display: none; margin-top: 20px; }
        img { width: 100%; border-radius: 15px; border: 2px solid var(--p); background: #111; }
        .down-btn { display: block; margin-top: 10px; color: var(--s); text-decoration: none; font-size: 0.8rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="title">Hitesh Cinematic</h1>
        <p style="font-size: 0.7rem; color: #888; margin-bottom: 15px;">Fastest AI Magic Studio</p>

        <textarea id="prompt" rows="2" placeholder="Describe Mahadev..."></textarea>
        <button class="btn" id="genBtn">CREATE MAGIC ✨</button>

        <div id="loader">⚡ AI is Processing...</div>

        <div id="result-box">
            <!-- Loader huye bina hi image src badlega -->
            <img id="outputImg" src="" alt="AI Magic">
            <a id="downBtn" class="down-btn" href="#" download="magic.png">📥 Save to Gallery</a>
        </div>
    </div>

    <script>
        const genBtn = document.getElementById('genBtn');
        const loader = document.getElementById('loader');
        const resultBox = document.getElementById('result-box');
        const outputImg = document.getElementById('outputImg');

        genBtn.onclick = () => {
            const userPrompt = document.getElementById('prompt').value;
            if(!userPrompt) return alert("Prompt dalo Hitesh bhai!");

            // UI Fast feedback
            loader.style.display = 'block';
            resultBox.style.display = 'block'; // Direct show image box
            genBtn.innerText = "Creating...";
            genBtn.disabled = true;

            // Enhancing for Mahadev (Short & Fast keywords)
            const enhanced = "Lord Shiva Mahadev, cinematic, highly detailed, divine, 4k";
            const finalPrompt = userPrompt + ", " + enhanced;
            const seed = Math.floor(Math.random() * 10000);

            // FAST MODEL URL
            const imageUrl = `https://image.pollinations.ai/prompt/${encodeURIComponent(finalPrompt)}?width=720&height=720&seed=${seed}&nologo=true`;

            // Display result immediately (Browser handles loading)
            outputImg.src = imageUrl;
            document.getElementById('downBtn').href = imageUrl;

            // Small delay to hide loader after image starts appearing
            setTimeout(() => {
                loader.style.display = 'none';
                genBtn.innerText = "CREATE MAGIC ✨";
                genBtn.disabled = false;
            }, 5000); // 5 seconds ke baad loader hat jayega
        };
    </script>
</body>
</html>

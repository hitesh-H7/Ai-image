<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hitesh Cinematic | AI Image Magic</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --accent: #ec4899;
            --dark-bg: #020617;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--dark-bg);
            color: #fff;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* --- SPLASH SCREEN --- */
        #splash {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 1s ease-in-out;
        }

        .hc-logo-container {
            width: 120px;
            height: 120px;
            border: 4px solid var(--primary);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary);
            box-shadow: 0 0 20px var(--primary);
            animation: blinkGlow 2s infinite ease-in-out;
            position: relative;
        }

        @keyframes blinkGlow {
            0%, 100% { box-shadow: 0 0 15px var(--primary); border-color: var(--primary); opacity: 0.8; }
            50% { box-shadow: 0 0 50px var(--accent); border-color: var(--accent); color: var(--accent); opacity: 1; }
        }

        .splash-text {
            margin-top: 25px;
            font-size: 1.2rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            font-weight: 400;
            color: #fff;
            opacity: 0;
            animation: fadeInText 1.5s forwards 0.5s;
        }

        @keyframes fadeInText { to { opacity: 1; transform: translateY(-5px); } }

        /* --- MAIN APP UI --- */
        #main-app {
            display: none;
            width: 90%;
            max-width: 450px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 40px 30px;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        p.subtitle { font-size: 0.85rem; color: #94a3b8; margin-bottom: 30px; }

        .input-group { margin-bottom: 25px; text-align: left; }

        textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 15px;
            color: #fff;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }

        textarea:focus { border-color: var(--primary); box-shadow: 0 0 15px rgba(139, 92, 246, 0.3); }

        .magic-btn {
            background: linear-gradient(45deg, var(--primary), var(--accent));
            color: #fff;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.5);
        }

        .magic-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px -5px rgba(236, 72, 153, 0.6); }

        .magic-btn:active { transform: scale(0.96); }

        /* Loader */
        .loader-container { display: none; margin: 25px 0; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Result Area */
        #result-area { display: none; margin-top: 30px; animation: zoomIn 0.5s forwards; }
        @keyframes zoomIn { from { opacity: 0; scale: 0.8; } to { opacity: 1; scale: 1; } }

        .output-img {
            width: 100%;
            border-radius: 20px;
            border: 2px solid var(--glass-border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .download-btn {
            display: inline-block;
            margin-top: 15px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
        }

        #status-msg { font-size: 0.8rem; color: #64748b; margin-top: 15px; }

    </style>
</head>
<body>

    <!-- 1. Splash Screen -->
    <div id="splash">
        <div class="hc-logo-container">HC</div>
        <div class="splash-text">Hitesh Cinematic</div>
    </div>

    <!-- 2. Main App -->
    <div id="main-app">
        <div class="glass-card">
            <h1>Hitesh Cinematic</h1>
            <p class="subtitle">Transform words into premium AI Art</p>

            <div class="input-group">
                <textarea id="prompt" rows="3" placeholder="Describe your imagination... (e.g. A futuristic samurai in cyberpunk city)"></textarea>
            </div>

            <button id="genBtn" class="magic-btn">CREATE MAGIC ✨</button>

            <div class="loader-container" id="loader">
                <div class="spinner"></div>
                <p id="status-msg">The AI is painting your dream...</p>
            </div>

            <div id="result-area">
                <img id="output-img" class="output-img" src="" alt="AI Result">
                <a id="download-link" class="download-btn" href="#" download="HC-Magic-Art.png">📥 Download Masterpiece</a>
            </div>
        </div>
    </div>

    <script>
        // --- Splash logic ---
        window.addEventListener('load', () => {
            setTimeout(() => {
                const splash = document.getElementById('splash');
                const app = document.getElementById('main-app');
                
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    app.style.display = 'block';
                    setTimeout(() => {
                        app.style.opacity = '1';
                        app.style.transform = 'translateY(0)';
                    }, 50);
                }, 1000);
            }, 3500); // Splash shows for 3.5s
        });

        // --- AI Logic ---
        // 🛑 Paste your Hugging Face Token below
        const HF_TOKEN = "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";

        const genBtn = document.getElementById('genBtn');
        const loader = document.getElementById('loader');
        const resultArea = document.getElementById('result-area');
        const statusMsg = document.getElementById('status-msg');

        genBtn.addEventListener('click', async () => {
            const prompt = document.getElementById('prompt').value;
            if(!prompt) return alert("Kuch toh likho Hitesh!");

            // UI Changes
            genBtn.style.display = 'none';
            loader.style.display = 'block';
            resultArea.style.display = 'none';
            statusMsg.innerText = "Connecting to AI server...";

            try {
                // We use Stable Diffusion XL for the best quality
                const response = await fetch(
                    "https://api-inference.huggingface.co/models/stabilityai/stable-diffusion-xl-base-1.0",
                    {
                        headers: { 
                            Authorization: `Bearer ${HF_TOKEN}`,
                            "Content-Type": "application/json"
                        },
                        method: "POST",
                        body: JSON.stringify({ inputs: prompt }),
                    }
                );

                if (response.status === 503) {
                    statusMsg.innerText = "AI is waking up... Please wait 30 seconds and try again.";
                    throw new Error("Model Loading");
                }

                if (!response.ok) {
                    throw new Error("Failed to create magic. Check token or try again.");
                }

                const blob = await response.blob();
                const imgUrl = URL.createObjectURL(blob);

                const outputImg = document.getElementById('output-img');
                const downloadLink = document.getElementById('download-link');
                
                outputImg.src = imgUrl;
                downloadLink.href = imgUrl;
                
                resultArea.style.display = 'block';
                statusMsg.innerText = "Magic Created Successfully! ✨";

            } catch (err) {
                console.error(err);
                alert(err.message);
                statusMsg.innerText = "Error occurred. Try again.";
            } finally {
                loader.style.display = 'none';
                genBtn.style.display = 'block';
            }
        });
    </script>
</body>
</html>
